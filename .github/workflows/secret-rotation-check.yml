name: secret-rotation-check

on:
  schedule:
    - cron: "47 15 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: secret-rotation-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ${{ vars.ALCOVE_RUNNER_LABELS_JSON != '' && fromJSON(vars.ALCOVE_RUNNER_LABELS_JSON) || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check secret age
        id: age
        env:
          GH_TOKEN: ${{ secrets.SPITFIRE_MIRROR_PAT }}
          MAX_SECRET_AGE_DAYS: "30"
        run: ./scripts/ops/check_secret_age.sh | tee "$RUNNER_TEMP/secret-age-report.md"

      - name: Open rotation issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh issue create \
            --repo Spitfire-Cowboy/alcove.software \
            --title "Secret rotation required (${ts})" \
            --body-file "$RUNNER_TEMP/secret-age-report.md" || true
