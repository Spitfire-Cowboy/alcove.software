name: mirror-parity-check

on:
  schedule:
    - cron: "41 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: mirror-parity-check
  cancel-in-progress: false

jobs:
  parity:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate secrets
        env:
          SOURCE_TOKEN: ${{ secrets.SPITFIRE_MIRROR_PAT }}
          DEST_TOKEN: ${{ secrets.PRO777_MIRROR_PAT }}
        run: |
          if [ -z "$SOURCE_TOKEN" ]; then
            echo "::error::Missing secret SPITFIRE_MIRROR_PAT"
            exit 1
          fi
          if [ -z "$DEST_TOKEN" ]; then
            echo "::error::Missing secret PRO777_MIRROR_PAT"
            exit 1
          fi

      - name: Check parity
        id: parity
        env:
          SOURCE_TOKEN: ${{ secrets.SPITFIRE_MIRROR_PAT }}
          DEST_TOKEN: ${{ secrets.PRO777_MIRROR_PAT }}
        run: ./scripts/ops/check_mirror_parity.sh

      - name: Open drift issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          title="Mirror parity drift detected (${ts})"
          body="Automatic parity check detected divergence between Spitfire-Cowboy canonical repos and Pro777 mirrors.\n\nRunbook: docs/ops/MIRRORING.md and docs/ops/CUTOVER_CHECKLIST.md"
          gh issue create --repo Spitfire-Cowboy/alcove.software --title "$title" --body "$body" || true
