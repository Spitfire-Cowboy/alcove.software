name: mirror-parity-check

on:
  schedule:
    - cron: "41 * * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: mirror-parity-check
  cancel-in-progress: false

jobs:
  parity:
    runs-on: ${{ vars.ALCOVE_RUNNER_LABELS_JSON != '' && fromJSON(vars.ALCOVE_RUNNER_LABELS_JSON) || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate secrets
        env:
          SOURCE_TOKEN: ${{ secrets.SPITFIRE_MIRROR_PAT }}
          DEST_TOKEN: ${{ secrets.PRO777_MIRROR_PAT }}
        run: |
          if [ -z "$SOURCE_TOKEN" ]; then
            echo "::error::Missing secret SPITFIRE_MIRROR_PAT"
            exit 1
          fi
          if [ -z "$DEST_TOKEN" ]; then
            echo "::error::Missing secret PRO777_MIRROR_PAT"
            exit 1
          fi

      - name: Check parity
        id: parity
        continue-on-error: true
        env:
          SOURCE_TOKEN: ${{ secrets.SPITFIRE_MIRROR_PAT }}
          DEST_TOKEN: ${{ secrets.PRO777_MIRROR_PAT }}
        run: ./scripts/ops/check_mirror_parity.sh

      - name: Open drift issue on failure
        if: steps.parity.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          title="Mirror parity drift detected (rolling incident)"
          body="Automatic parity check detected divergence between Spitfire-Cowboy canonical repos and Pro777 mirrors.\n\nRunbook: docs/ops/MIRRORING.md and docs/ops/CUTOVER_CHECKLIST.md"
          issue_number="$(gh issue list --repo Spitfire-Cowboy/alcove.software --state open --search "$title in:title" --json number,title --jq ".[] | select(.title == \"$title\") | .number" | head -1)"
          if [ -z "$issue_number" ]; then
            issue_number="$(gh api repos/Spitfire-Cowboy/alcove.software/issues -X POST -f title="$title" -f body="$body" --jq '.number')"
          fi
          marker="mirror-alert type:parity-drift run:${{ github.run_id }}"
          existing_for_run="$(gh api repos/Spitfire-Cowboy/alcove.software/issues/$issue_number/comments?per_page=200 --jq "[.[] | select(.body | contains(\"${marker}\"))] | length")"
          if [ "${existing_for_run}" -gt 0 ]; then
            echo "Run marker already posted for this run; skipping duplicate incident comment."
            exit 0
          fi
          gh issue comment "$issue_number" --repo Spitfire-Cowboy/alcove.software --body "[$ts] parity drift detected in run: $run_url\n\n<!-- ${marker} -->"

      - name: Close rolling parity issue after healthy streak
        if: steps.parity.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          title="Mirror parity drift detected (rolling incident)"
          issue_number="$(gh issue list --repo Spitfire-Cowboy/alcove.software --state open --search "$title in:title" --json number,title --jq ".[] | select(.title == \"$title\") | .number" | head -1)"
          if [ -z "$issue_number" ]; then
            echo "No open rolling parity issue."
            exit 0
          fi

          streak_runs="$(gh api repos/Spitfire-Cowboy/alcove.software/actions/workflows/mirror-parity-check.yml/runs?per_page=3 --jq '.workflow_runs[].id')"
          comments="$(gh api repos/Spitfire-Cowboy/alcove.software/issues/$issue_number/comments?per_page=200 --jq '.[].body')"
          unhealthy=0
          while read -r run_id; do
            [ -z "$run_id" ] && continue
            if printf '%s\n' "$comments" | grep -q "mirror-alert type:parity-drift run:${run_id}"; then
              unhealthy=1
              break
            fi
          done <<< "$streak_runs"

          if [ "$unhealthy" -eq 0 ]; then
            ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            gh issue comment "$issue_number" --repo Spitfire-Cowboy/alcove.software --body "[$ts] Closing after 3 healthy parity runs with no drift marker."
            gh issue close "$issue_number" --repo Spitfire-Cowboy/alcove.software
          else
            echo "Healthy streak not reached yet."
          fi
