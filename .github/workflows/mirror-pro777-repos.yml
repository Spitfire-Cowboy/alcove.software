name: mirror-spitfire-repos

on:
  schedule:
    - cron: "11 * * * *"
  workflow_dispatch:
    inputs:
      allow_force_mirror:
        description: "Allow destructive reconciliation (branch/tag rewrites and large prune deletes)"
        required: false
        default: false
        type: boolean
      max_prune_deletions:
        description: "Max destination branch deletions allowed in safe mode"
        required: false
        default: "5"
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: mirror-spitfire-repos
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ${{ vars.ALCOVE_RUNNER_LABELS_JSON != '' && fromJSON(vars.ALCOVE_RUNNER_LABELS_JSON) || 'ubuntu-latest' }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - source_repo: Spitfire-Cowboy/alcove
            dest_repo: Pro777/alcove
          - source_repo: Spitfire-Cowboy/alcove-private
            dest_repo: Pro777/alcove-private
          - source_repo: Spitfire-Cowboy/alcove-demo
            dest_repo: Pro777/alcove-demo
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate secrets
        env:
          SOURCE_TOKEN: ${{ secrets.SPITFIRE_MIRROR_PAT }}
          SSH_KEY: ${{ secrets.PRO777_MIRROR_SSH_KEY != '' && secrets.PRO777_MIRROR_SSH_KEY || secrets.SPITFIRE_MIRROR_SSH_KEY }}
        run: |
          if [ -z "$SOURCE_TOKEN" ]; then
            echo "::error::Missing secret SPITFIRE_MIRROR_PAT"
            exit 1
          fi
          if [ -z "$SSH_KEY" ]; then
            echo "::error::Missing secret PRO777_MIRROR_SSH_KEY (or fallback SPITFIRE_MIRROR_SSH_KEY)"
            exit 1
          fi

      - name: Configure SSH auth for destination push
        env:
          SSH_KEY: ${{ secrets.PRO777_MIRROR_SSH_KEY != '' && secrets.PRO777_MIRROR_SSH_KEY || secrets.SPITFIRE_MIRROR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Mirror source to destination
        id: mirror
        continue-on-error: true
        env:
          SOURCE_REPO: ${{ matrix.source_repo }}
          DEST_REPO: ${{ matrix.dest_repo }}
          SOURCE_TOKEN: ${{ secrets.SPITFIRE_MIRROR_PAT }}
          DEST_PUSH_MODE: ssh
          STRICT_PAIRING: "1"
          MAX_PRUNE_DELETIONS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_prune_deletions || '5' }}
          ALLOW_FORCE_MIRROR: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_force_mirror == 'true' && '1' || '0' }}
        run: ./scripts/ops/mirror_repo_pair.sh

      - name: Open mirror issue on failure
        if: steps.mirror.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          title="Mirror sync blocked (${ts})"
          body="Mirror attempt failed for ${{ matrix.source_repo }} -> ${{ matrix.dest_repo }}.\n\nThis workflow is advisory while destination branch protections require PR-based updates.\n\nRunbook: docs/ops/MIRRORING.md and docs/ops/CUTOVER_CHECKLIST.md"
          gh issue create --repo Spitfire-Cowboy/alcove.software --title "$title" --body "$body" || true
