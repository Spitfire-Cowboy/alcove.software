name: ci

on:
  push:
    branches: ["main", "Pro777/**"]
  pull_request:

jobs:
  validate-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Validate static artifacts
        run: ./scripts/validate_site.sh
