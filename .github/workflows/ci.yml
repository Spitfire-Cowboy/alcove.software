name: ci

on:
  push:
    branches: ["main", "Pro777/**"]
    paths:
      - "site/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "site/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/pages.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static artifacts
        run: ./scripts/validate_site.sh
