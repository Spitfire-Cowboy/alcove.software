name: domain-health

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: domain-health
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run live domain cutover check
        id: check
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          # The public site is currently served at the Cloudflare edge while
          # GitHub Pages custom-domain redirect/TLS state is repaired manually.
          EXPECTED_HTTP_REDIRECT: "false"
          EXPECTED_HTTPS_ENFORCED: ""
          EXPECTED_PAGES_BUILD_TYPE: ""
          EXPECTED_CERT_STATE: ""
        run: ./scripts/ops/check_domain_cutover.sh alcove.software

      - name: Open or update domain health incident
        if: ${{ steps.check.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh label create production-monitor --color D73A4A --description "Production synthetic monitor incident" 2>/dev/null || true
          issue_number="$(gh issue list --state open --label production-monitor --json number --jq '.[0].number // empty')"
          body="$RUNNER_TEMP/domain-health-incident.md"
          {
            echo "Production domain health monitor failed for https://alcove.software/."
            echo
            echo "Run: ${RUN_URL}"
            echo
            echo "Checks include:"
            echo "- apex domain resolves"
            echo "- https://alcove.software/ plus robots.txt, sitemap.xml, and llms.txt return 200"
            echo "- GitHub Pages API still reports a public site and the expected custom domain"
            echo
            echo "Strict HTTP redirect and GitHub Pages TLS/workflow-mode assertions remain in"
            echo "the manual cutover verification workflow while the Cloudflare edge fallback is active."
          } > "$body"
          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" --body-file "$body"
          else
            gh issue create --title "Production domain health failing" --label production-monitor --label ops --body-file "$body"
          fi

      - name: Close recovered domain health incidents
        if: ${{ steps.check.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          for issue_number in $(gh issue list --state open --label production-monitor --json number --jq '.[].number'); do
            gh issue close "$issue_number" --comment "Production domain health recovered. Run: ${RUN_URL}"
          done

      - name: Fail workflow on monitor failure
        if: ${{ steps.check.outcome == 'failure' }}
        run: exit 1
