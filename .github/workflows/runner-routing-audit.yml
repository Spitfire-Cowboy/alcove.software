name: runner-routing-audit

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/*.yml"
      - "scripts/ops/audit_runner_routing.sh"
  pull_request:
    paths:
      - ".github/workflows/*.yml"
      - "scripts/ops/audit_runner_routing.sh"

permissions:
  contents: read

concurrency:
  group: runner-routing-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate runner routing policy
        run: ./scripts/ops/audit_runner_routing.sh
